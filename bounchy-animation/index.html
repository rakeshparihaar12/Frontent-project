<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounchy-animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;

        }

        .box {
            height: 80vh;
            width: 100vw;
            background-color: rgb(18, 143, 157);
            position: relative;
            overflow: hidden;
        }

        .ball {
            width: 50px;
            height: 50px;
            background-color: black;
            border-radius: 120%;
            position: absolute;
            left: 0;
            bottom: 0;
            animation: movex 3s linear infinite, movey 3s ease-out infinite alternate;
        }

        @keyframes movex {
            from {
                left: 0;

            }

            to {
                left: 100%;
            }
        }

        @keyframes movey {
            from {
                bottom: 0;

            }

            to {
                bottom: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="ball">

        </div>
    </div>
</body>

</html>
